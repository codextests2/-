<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醋坛子娃娃机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/bundle.umd.js"></script>
    <style>
        body {
            touch-action: manipulation;
            background:
                radial-gradient(circle at 50% 12%, rgba(190, 255, 226, 0.2), transparent 38%),
                linear-gradient(155deg, #173b33 0%, #071612 72%, #030908 100%);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .machine-shell {
            width: min(92vw, 48dvh, 26rem);
            aspect-ratio: 4 / 5;
            flex: 0 0 auto;
        }

        .app-width {
            width: min(92vw, 48dvh, 26rem);
        }

        #collection-bin {
            flex-wrap: nowrap;
            overflow-x: auto;
        }

        .top-card, .collection-card {
            color: #163d33;
            background: rgba(224, 255, 243, 0.86);
            border: 0.0625rem solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0.8rem 2rem rgba(0, 20, 15, 0.24);
            backdrop-filter: blur(1rem);
        }

        .upload-chip {
            color: #14382f;
            background: linear-gradient(135deg, #f8fff9, #b7efd7);
            box-shadow: 0 0.5rem 1.2rem rgba(32, 111, 86, 0.22);
        }

        .machine-shell {
            border-color: #a5dfca;
            background: linear-gradient(160deg, #d9fff0 0%, #bfeeda 55%, #9ed7c3 100%);
            box-shadow:
                inset 0 0 0 0.18rem rgba(255, 255, 255, 0.42),
                0 1.5rem 3.5rem rgba(2, 28, 21, 0.35),
                0 0 2rem rgba(163, 245, 214, 0.25);
        }

        .machine-top {
            height: 15%;
            color: #285c4d;
            background: linear-gradient(180deg, rgba(235,255,247,0.96), rgba(196,239,221,0.92));
            border-bottom: 0.08rem solid rgba(49, 115, 94, 0.25);
            box-shadow: 0 0.5rem 1.4rem rgba(46, 112, 90, 0.16);
        }

        .control-deck {
            background: linear-gradient(155deg, #d8faec 0%, #a7dbc8 100%);
            border-color: #8bc7b2;
            box-shadow: 0 1.2rem 2.6rem rgba(1, 27, 20, 0.35);
        }

        #game-area::before {
            content: '';
            position: absolute;
            inset: 17% 5% 4%;
            z-index: 35;
            pointer-events: none;
            border: 0.18rem solid rgba(89, 151, 130, 0.42);
            border-radius: 1rem;
            box-shadow: inset 0 0 1.6rem rgba(21, 99, 76, 0.12);
        }

        #btn-left, #btn-right {
            color: #285c4d;
            background: linear-gradient(#f8fff9, #b7d7ca);
        }

        #btn-drop {
            background: linear-gradient(#ff7b72, #e5423a);
        }

        .settings-panel {
            width: min(92vw, 28rem);
            max-block-size: 86dvh;
            overflow-y: auto;
            color: #173f34;
            background: rgba(231, 255, 246, 0.97);
            border: 0.08rem solid rgba(255,255,255,0.85);
            box-shadow: 0 2rem 5rem rgba(0, 22, 16, 0.42);
        }

        .settings-presets {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(3rem, 1fr));
            gap: 0.65rem;
        }

        .preset-strip {
            scrollbar-width: thin;
            scrollbar-color: rgba(244, 114, 182, 0.7) transparent;
        }

        .preset-button {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 50%;
            border: 0.12rem solid rgba(67, 130, 109, 0.42);
            background: rgba(255, 255, 255, 0.72);
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .preset-button:hover, .preset-button:focus-visible {
            transform: translateY(-2px) scale(1.05);
            border-color: #f9a8d4;
            outline: none;
        }

        .preset-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .glass-glare {
            background: linear-gradient(105deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0.3) 45%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        #rope {
            width: 5px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, #64748b, #f8fafc 48%, #475569);
            box-shadow: 0 0 8px rgba(125, 211, 252, 0.65);
        }

        #claw-head {
            filter: drop-shadow(0 6px 5px rgba(15, 23, 42, 0.42));
        }

        .claw-cap {
            position: relative;
            width: 38px;
            height: 24px;
            z-index: 10;
            border: 2px solid #7c2d12;
            border-radius: 14px 14px 8px 8px;
            background: linear-gradient(145deg, #fef3c7 5%, #fbbf24 45%, #f97316 100%);
            box-shadow: inset 0 3px 3px rgba(255,255,255,0.7), 0 0 12px rgba(251,191,36,0.7);
        }

        .claw-cap::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -8px;
            width: 15px;
            height: 15px;
            border: 2px solid #334155;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #fff, #67e8f9 32%, #2563eb 75%);
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(34,211,238,0.9);
        }

        #prong-left, #prong-right {
            width: 8px;
            height: 44px;
            top: 19px;
            border: 1px solid #334155;
            border-radius: 999px;
            background: linear-gradient(90deg, #475569, #e2e8f0 48%, #64748b);
            transition: transform 0.3s cubic-bezier(.2,.8,.2,1);
            box-shadow: inset 1px 0 2px rgba(255,255,255,0.7), 0 3px 5px rgba(15,23,42,0.35);
        }

        #prong-left { left: 7px; }
        #prong-right { right: 7px; }
        #prong-left::after, #prong-right::after {
            content: '';
            position: absolute;
            bottom: -3px;
            width: 15px;
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(#f8fafc, #64748b);
        }
        #prong-left::after { left: -8px; transform: rotate(-20deg); }
        #prong-right::after { right: -8px; transform: rotate(20deg); }
        .claw-open #prong-left { transform: rotate(38deg); }
        .claw-open #prong-right { transform: rotate(-38deg); }
        .claw-closed #prong-left { transform: rotate(7deg); }
        .claw-closed #prong-right { transform: rotate(-7deg); }

        .prize-item {
            position: absolute;
            transform: translate(-50%, -50%);
            user-select: none;
            -webkit-user-drag: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden;
            background: radial-gradient(circle at 28% 22%, rgba(255,255,255,0.95), rgba(216,235,255,0.32) 45%, rgba(139,92,246,0.46) 100%);
            box-shadow: inset -12px -14px 25px rgba(67,56,202,0.2), 0 9px 18px rgba(30,27,75,0.34);
            border: 2px solid rgba(255,255,255,0.65);
        }
        
        .prize-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.08);
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25));
        }

        .arcade-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 0 #b91c1c; }
        .arcade-btn { box-shadow: 0 6px 0 0 #9f1239, 0 10px 24px rgba(136,19,55,0.4); transition: all 0.1s; }
        .arcade-btn-blue:active { transform: translateY(4px); box-shadow: 0 0px 0 0 #1d4ed8; }
        .arcade-btn-blue { box-shadow: 0 6px 0 0 #4338ca, 0 10px 24px rgba(67,56,202,0.4); transition: all 0.1s; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ec4899;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 h-[100dvh] flex flex-col items-center justify-start px-2 py-1.5 font-sans text-white">

    <div class="top-card app-width mb-1.5 flex justify-between items-center px-3 py-2 rounded-2xl">
        <h1 class="text-base font-bold text-[#285c4d]">醋坛子娃娃机</h1>
        <button id="btn-settings" type="button" aria-label="開啟設定" class="w-9 aspect-square rounded-full bg-white/60 text-xl text-[#285c4d] hover:bg-white/90 transition">⚙</button>
    </div>

    <div class="top-card app-width mb-1.5 grid grid-cols-3 gap-x-2 gap-y-0 p-1.5 rounded-2xl text-center">
        <div><span class="block text-[10px] text-gray-400">剩餘時間</span><strong id="time-display" class="text-lg text-cyan-300">60</strong></div>
        <div><span class="block text-[10px] text-gray-400">目前分數</span><strong id="score-display" class="text-lg text-pink-300">0</strong></div>
        <div><span class="block text-[10px] text-gray-400">最高分</span><strong id="best-display" class="text-lg text-yellow-300">0</strong></div>
        <p class="col-span-3 text-[10px] text-gray-300">金色 50 分且較滑・其他 10 分・對準中心更容易抓到</p>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-75 z-[80] flex flex-col items-center justify-center text-white">
        <div class="loader mb-4"></div>
        <p class="font-bold text-lg">AI 正在為圖片去背...</p>
        <p class="text-sm text-gray-300 mt-2">首次執行會下載 AI 模型，請稍候幾秒鐘</p>
    </div>

    <div id="settings-overlay" class="hidden fixed inset-0 bg-[#061712]/80 z-[70] flex items-center justify-center p-4">
        <section class="settings-panel rounded-3xl p-5" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="flex items-center justify-between mb-4">
                <h2 id="settings-title" class="text-xl font-black">游戏设置</h2>
                <button id="btn-close-settings" type="button" aria-label="關閉設定" class="w-9 aspect-square rounded-full bg-[#285c4d]/10 text-xl">×</button>
            </div>
            <label class="upload-chip cursor-pointer flex items-center justify-center w-full px-4 py-3 rounded-2xl text-sm font-bold transition">
                ➕ 上传图片并自动去背
                <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
            </label>
            <div class="mt-5">
                <h3 class="text-sm font-bold mb-3">预设图案（点击加入娃娃机）</h3>
                <div id="preset-bin" class="settings-presets"></div>
            </div>
        </section>
    </div>

    <div class="machine-shell relative rounded-t-[2rem] border-[0.45rem] overflow-hidden flex flex-col">
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHBhdGggZD0iTTAgMGgyMHYyMEgwem0xMCAxMGgxMHYxMEgxMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4yKSIvPjwvc3ZnPg==')] opacity-50"></div>
        <div class="machine-top absolute top-0 w-full z-20 flex justify-center items-center">
            <h2 class="text-[clamp(1rem,5vw,1.65rem)] font-medium tracking-[0.08em]">选取心仪礼物</h2>
        </div>

        <div id="game-area" class="relative flex-1 w-full h-full">
            <div class="absolute bottom-0 left-0 w-[25%] h-[20%] bg-gray-800 border-r-4 border-t-4 border-gray-600 rounded-tr-xl flex items-center justify-center z-10">
                <div class="w-3/4 h-3/4 bg-black rounded-lg shadow-inner"></div>
            </div>
            
            <div id="prizes-container" class="absolute inset-0 z-10"></div>

            <div id="claw-assembly" class="absolute top-0 z-30" style="left: 60%; transform: translateX(-50%);">
                <div id="rope" class="mx-auto" style="height: 50px;"></div>
                <div id="claw-head" class="relative claw-open w-16 h-12 flex flex-col items-center -mt-1">
                    <div class="claw-cap"></div>
                    <div class="absolute origin-top" id="prong-left"></div>
                    <div class="absolute origin-top" id="prong-right"></div>
                </div>
            </div>
        </div>

        <div class="glass-glare absolute inset-0 z-40 rounded-t-2xl"></div>
    </div>

    <div class="control-deck app-width p-2 rounded-b-[2rem] border-x-[0.45rem] border-b-[0.45rem] flex justify-between items-center z-50">
        <div class="flex space-x-2">
            <button id="btn-left" aria-label="向左移動" class="arcade-btn-blue w-12 h-12 bg-blue-500 hover:bg-blue-400 rounded-full text-xl flex justify-center items-center select-none active:bg-blue-600 text-white font-black">◀</button>
            <button id="btn-right" aria-label="向右移動" class="arcade-btn-blue w-12 h-12 bg-blue-500 hover:bg-blue-400 rounded-full text-xl flex justify-center items-center select-none active:bg-blue-600 text-white font-black">▶</button>
        </div>
        <button id="btn-drop" class="arcade-btn w-14 h-14 bg-red-500 hover:bg-red-400 rounded-full text-lg font-bold flex justify-center items-center select-none active:bg-red-600 text-white uppercase tracking-wider">GO!</button>
    </div>

    <div id="game-over-overlay" class="hidden fixed inset-0 bg-black bg-opacity-80 z-[60] flex flex-col items-center justify-center text-white p-6">
        <div class="top-card w-full max-w-xs p-6 rounded-3xl text-center">
            <p class="text-sm text-pink-300 font-bold mb-2">時間到！</p>
            <h2 class="text-3xl font-black mb-2">總分 <span id="final-score">0</span> 分</h2>
            <p id="result-message" class="text-sm text-gray-300 mb-5">最高分獲勝</p>
            <button id="btn-restart" class="upload-chip px-6 py-3 rounded-xl font-bold">再玩一局</button>
        </div>
    </div>

    <div class="collection-card app-width mt-1.5 px-3 py-1.5 rounded-2xl overflow-hidden">
        <h2 class="text-[0.65rem] text-[#52786c] font-bold">战利品</h2>
        <div id="collection-bin" class="flex gap-1 min-h-[2rem]"></div>
    </div>

    <script>
        const GAME_W = 1000;
        const GAME_H = 1000;
        const CHUTE_W = 250; 
        const CHUTE_X = 125; 
        const ROUND_SECONDS = 60;
        const PRESET_IMAGES = [
            'assets/presets/preset-01.png',
            ...Array.from({ length: 19 }, (_, index) =>
                `assets/presets/preset-${String(index + 2).padStart(2, '0')}.jpeg`
            )
        ];
        
        let claw = {
            x: 600, y: 100, 
            state: 'IDLE', 
            speedX: 8, speedY: 12
        };

        let prizes = [];
        let grabbedPrize = null;
        let isMovingLeft = false;
        let isMovingRight = false;
        let score = 0;
        let timeLeft = ROUND_SECONDS;
        let gameActive = false;
        let timerId = null;
        let dropOriginX = claw.x;
        let settingsOpen = false;
        let bestScore = Number(localStorage.getItem('vinegar-claw-best') || 0);
        const objectUrls = new Set();
        
        const clawAssembly = document.getElementById('claw-assembly');
        const rope = document.getElementById('rope');
        const clawHead = document.getElementById('claw-head');
        const prizesContainer = document.getElementById('prizes-container');
        const collectionBin = document.getElementById('collection-bin');
        const presetBin = document.getElementById('preset-bin');
        const gameArea = document.getElementById('game-area');
        const loadingOverlay = document.getElementById('loading-overlay');
        const timeDisplay = document.getElementById('time-display');
        const scoreDisplay = document.getElementById('score-display');
        const bestDisplay = document.getElementById('best-display');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScore = document.getElementById('final-score');
        const resultMessage = document.getElementById('result-message');
        const btnRestart = document.getElementById('btn-restart');
        const settingsOverlay = document.getElementById('settings-overlay');
        const btnSettings = document.getElementById('btn-settings');
        const btnCloseSettings = document.getElementById('btn-close-settings');
        bestDisplay.textContent = bestScore;

        function addPrize(imgSrc) {
            const id = 'prize_' + Math.random().toString(36).substring(2, 9);
            const size = 100;
            
            const minX = CHUTE_W + size;
            const maxX = GAME_W - size;
            const x = minX + Math.random() * (maxX - minX);
            const y = -size;
            
            const el = document.createElement('div');
            el.className = 'prize-item'; 
            el.style.width = '10%';
            el.style.aspectRatio = '1 / 1';
            el.id = id;
            el.innerHTML = `<img src="${imgSrc}" alt="prize">`;
            
            prizesContainer.appendChild(el);
            
            prizes.push({
                id, el, x, y, size,
                content: imgSrc,
                points: imgSrc.includes('preset-18.') ? 50 : 10,
                isGrabbed: false,
                isCollected: false,
                rotation: Math.random() * 360,
                vx: (Math.random() - 0.5) * 5, 
                vy: 0,
                mass: 1
            });
            
            updatePrizeDOM();
        }

        function initializePresets() {
            PRESET_IMAGES.forEach((src, index) => {
                const button = document.createElement('button');
                const image = document.createElement('img');
                button.type = 'button';
                button.className = 'preset-button';
                button.setAttribute('aria-label', `加入預設圖案 ${index + 1}`);
                image.src = src;
                image.alt = `預設圖案 ${index + 1}`;
                button.appendChild(image);
                button.addEventListener('click', () => addPrize(src));
                presetBin.appendChild(button);

            });
        }

        function spawnPresetPrizes() {
            PRESET_IMAGES.forEach((src, index) => {
                setTimeout(() => addPrize(src), index * 120);
            });
        }

        function updateScoreboard() {
            timeDisplay.textContent = timeLeft;
            scoreDisplay.textContent = score;
            bestDisplay.textContent = bestScore;
        }

        function beginTimer() {
            gameActive = true;
            timerId = setInterval(() => {
                if (settingsOpen) return;
                timeLeft -= 1;
                updateScoreboard();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            clearInterval(timerId);
            timerId = null;
            gameActive = false;
            isMovingLeft = false;
            isMovingRight = false;
            claw.state = 'IDLE';
            if (grabbedPrize) {
                grabbedPrize.isGrabbed = false;
                grabbedPrize = null;
            }

            const isNewBest = score > bestScore;
            if (isNewBest) {
                bestScore = score;
                localStorage.setItem('vinegar-claw-best', String(bestScore));
            }
            updateScoreboard();
            finalScore.textContent = score;
            resultMessage.textContent = isNewBest ? '新紀錄！目前最高分' : `最高分是 ${bestScore} 分`;
            gameOverOverlay.classList.remove('hidden');
        }

        function resetRound() {
            clearInterval(timerId);
            timerId = null;
            gameActive = false;
            score = 0;
            timeLeft = ROUND_SECONDS;
            claw = { x: 600, y: 100, state: 'IDLE', speedX: 8, speedY: 12 };
            dropOriginX = claw.x;
            grabbedPrize = null;
            isMovingLeft = false;
            isMovingRight = false;
            prizes.forEach(prize => prize.el.remove());
            prizes = [];
            collectionBin.replaceChildren();
            gameOverOverlay.classList.add('hidden');
            settingsOpen = false;
            settingsOverlay.classList.add('hidden');
            updateScoreboard();
            spawnPresetPrizes();
            setTimeout(beginTimer, PRESET_IMAGES.length * 120 + 300);
        }

        document.getElementById('image-upload').addEventListener('change', async function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            loadingOverlay.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    if (typeof window.imglyRemoveBackground !== 'function') {
                        throw new Error('去背元件載入失敗');
                    }
                    const blob = await window.imglyRemoveBackground(file);
                    const url = URL.createObjectURL(blob);
                    objectUrls.add(url);
                    addPrize(url);
                } catch (error) {
                    console.error('去背失敗，改用原圖：', error);
                    const reader = new FileReader();
                    reader.onload = (event) => addPrize(event.target.result);
                    reader.readAsDataURL(file);
                }
            }
            
            loadingOverlay.classList.add('hidden');
            this.value = ''; 
        });

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnDrop = document.getElementById('btn-drop');

        window.addEventListener('beforeunload', () => {
            objectUrls.forEach(url => URL.revokeObjectURL(url));
        });

        // 長按按鈕，統一使用 Pointer Events 支援滑鼠與觸控
        const bindHoldEvent = (btn, dir) => {
            const start = (e) => { e.preventDefault(); if(gameActive && claw.state === 'IDLE') dir === 'left' ? isMovingLeft = true : isMovingRight = true; };
            const stop = (e) => { e.preventDefault(); isMovingLeft = false; isMovingRight = false; };
            btn.addEventListener('pointerdown', start);
            btn.addEventListener('pointerup', stop);
            btn.addEventListener('pointercancel', stop);
            btn.addEventListener('pointerleave', stop);
        };

        bindHoldEvent(btnLeft, 'left');
        bindHoldEvent(btnRight, 'right');

        btnDrop.addEventListener('click', () => {
            if (gameActive && claw.state === 'IDLE') {
                dropOriginX = claw.x;
                claw.state = 'DROPPING';
                isMovingLeft = false;
                isMovingRight = false;
            }
        });

        function updateDOM() {
            clawAssembly.style.left = `${(claw.x / GAME_W) * 100}%`;
            rope.style.height = `${(claw.y / GAME_H) * gameArea.clientHeight}px`;

            if (['IDLE', 'DROPPING', 'RELEASING', 'RETURNING'].includes(claw.state)) {
                clawHead.classList.add('claw-open');
                clawHead.classList.remove('claw-closed');
            } else {
                clawHead.classList.remove('claw-open');
                clawHead.classList.add('claw-closed');
            }
        }

        function updatePrizeDOM() {
            prizes.forEach(p => {
                if (p.isCollected) return; 
                p.el.style.left = `${(p.x / GAME_W) * 100}%`;
                p.el.style.top = `${(p.y / GAME_H) * 100}%`;
                p.el.style.transform = `translate(-50%, -50%) rotate(${p.rotation}deg)`;
            });
        }

        function updatePhysics() {
            const gravity = 0.8;
            const friction = 0.9;
            const restitution = 0.4;

            prizes.forEach((p, pIndex) => {
                if (p.isCollected || p.isGrabbed) return;

                p.vy += gravity;
                p.x += p.vx;
                p.y += p.vy;

                if (p.y > GAME_H - p.size / 2) {
                    p.y = GAME_H - p.size / 2;
                    p.vy *= -restitution;
                    p.vx *= friction;
                }
                
                if (p.x > GAME_W - p.size / 2) {
                    p.x = GAME_W - p.size / 2;
                    p.vx *= -restitution;
                } else if (p.x < CHUTE_W + p.size / 2) {
                    if(p.y > GAME_H * 0.8) {
                        p.x = CHUTE_W + p.size / 2;
                        p.vx *= -restitution;
                    } else if (p.x < p.size/2) {
                         p.x = p.size/2;
                         p.vx *= -restitution;
                    }
                }

                prizes.forEach((other, otherIndex) => {
                    if (otherIndex <= pIndex || other.isCollected || other.isGrabbed) return;

                    const dx = other.x - p.x;
                    const dy = other.y - p.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = (p.size + other.size) / 2;

                    if (distance < minDistance) {
                        const overlap = minDistance - distance;
                        const angle = distance === 0
                            ? Math.random() * Math.PI * 2
                            : Math.atan2(dy, dx);
                        
                        const moveX = Math.cos(angle) * overlap / 2;
                        const moveY = Math.sin(angle) * overlap / 2;
                        
                        p.x -= moveX;
                        p.y -= moveY;
                        other.x += moveX;
                        other.y += moveY;

                        const tempVx = p.vx;
                        const tempVy = p.vy;
                        p.vx = other.vx * restitution;
                        p.vy = other.vy * restitution;
                        other.vx = tempVx * restitution;
                        other.vy = tempVy * restitution;
                    }
                });
            });
        }

        function checkClawCollision() {
            let closest = null;
            let minDist = Infinity;
            
            prizes.forEach(p => {
                if (p.isCollected || p.isGrabbed) return;
                
                const dx = Math.abs(p.x - claw.x);
                const dy = p.y - claw.y; 

                if (dx < p.size * 0.5 && dy > 0 && dy < p.size * 0.65) {
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = p;
                    }
                }
            });
            return closest;
        }

        function gameLoop() {
            if (settingsOpen) {
                requestAnimationFrame(gameLoop);
                return;
            }
            updatePhysics();

            if (claw.state === 'IDLE') {
                if (isMovingLeft) claw.x -= claw.speedX;
                if (isMovingRight) claw.x += claw.speedX;
                if (claw.x < CHUTE_W + 50) claw.x = CHUTE_W + 50;
                if (claw.x > GAME_W - 50) claw.x = GAME_W - 50;
            }

            switch (claw.state) {
                case 'DROPPING':
                    claw.y += claw.speedY;
                    claw.x = Math.max(
                        CHUTE_W + 50,
                        Math.min(GAME_W - 50, dropOriginX + Math.sin(performance.now() / 95) * 14)
                    );
                    const hitPrize = checkClawCollision();
                    if (hitPrize || claw.y >= GAME_H - 100) {
                        claw.state = 'GRABBING';
                        if (hitPrize) {
                            const offset = Math.abs(hitPrize.x - claw.x);
                            const alignment = Math.max(0, 1 - offset / (hitPrize.size * 0.5));
                            const isGolden = hitPrize.points === 50;
                            const grabChance = (isGolden ? 0.35 : 0.55) + alignment * (isGolden ? 0.35 : 0.4);
                            if (Math.random() <= grabChance) {
                                grabbedPrize = hitPrize;
                                grabbedPrize.isGrabbed = true;
                                grabbedPrize.vx = 0;
                                grabbedPrize.vy = 0;
                            }
                        }
                        setTimeout(() => {
                            if(claw.state === 'GRABBING') claw.state = 'RISING';
                        }, 400);
                    }
                    break;
                    
                case 'RISING':
                    claw.y -= claw.speedY;
                    if (claw.y <= 100) {
                        claw.y = 100;
                        claw.state = 'MOVING_CHUTE';
                    }
                    break;

                case 'MOVING_CHUTE':
                    claw.x -= claw.speedX;
                    if (claw.x <= CHUTE_X) {
                        claw.x = CHUTE_X;
                        claw.state = 'RELEASING';
                        setTimeout(() => {
                            if(claw.state === 'RELEASING') {
                                if (grabbedPrize) {
                                    grabbedPrize.isGrabbed = false;
                                    grabbedPrize.isCollected = true;
                                    grabbedPrize.el.style.display = 'none'; 
                                    score += grabbedPrize.points;
                                    updateScoreboard();
                                    
                                    const colItem = document.createElement('div');
                                    colItem.className = 'w-8 h-8 shrink-0 rounded-full flex items-center justify-center border border-gray-400 relative overflow-hidden';
                                    colItem.style.background = 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(200,230,255,0.8) 50%, rgba(100,180,255,0.9) 100%)';
                                    colItem.innerHTML = `<img src="${grabbedPrize.content}" class="w-4/5 h-4/5 object-contain">`;
                                    const pointsBadge = document.createElement('span');
                                    pointsBadge.className = 'absolute bottom-0 right-0 bg-black/70 text-[8px] font-bold text-yellow-300 px-1 rounded';
                                    pointsBadge.textContent = `+${grabbedPrize.points}`;
                                    colItem.appendChild(pointsBadge);
                                    collectionBin.appendChild(colItem);
                                    
                                    grabbedPrize = null;
                                }
                                setTimeout(() => { claw.state = 'RETURNING'; }, 500);
                            }
                        }, 400);
                    }
                    break;

                case 'RETURNING':
                    claw.x += claw.speedX;
                    if (claw.x >= 600) { 
                        claw.x = 600;
                        claw.state = 'IDLE';
                    }
                    break;
            }

            if (grabbedPrize && grabbedPrize.isGrabbed) {
                grabbedPrize.x = claw.x;
                grabbedPrize.y = claw.y + 50; 
            }

            updateDOM();
            updatePrizeDOM();
            requestAnimationFrame(gameLoop);
        }

        function setSettings(open) {
            settingsOpen = open;
            if (open) {
                isMovingLeft = false;
                isMovingRight = false;
            }
            settingsOverlay.classList.toggle('hidden', !open);
        }

        btnSettings.addEventListener('click', () => setSettings(true));
        btnCloseSettings.addEventListener('click', () => setSettings(false));
        settingsOverlay.addEventListener('click', event => {
            if (event.target === settingsOverlay) setSettings(false);
        });
        document.addEventListener('keydown', event => {
            if (event.key === 'Escape' && settingsOpen) setSettings(false);
        });
        btnRestart.addEventListener('click', resetRound);
        initializePresets();
        resetRound();
        requestAnimationFrame(gameLoop);

    </script>
</body>
