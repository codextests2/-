<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醋坛子娃娃机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/bundle.umd.js"></script>
    <style>
        body {
            touch-action: manipulation;
            background:
                radial-gradient(circle at 20% 10%, rgba(34, 211, 238, 0.22), transparent 34%),
                radial-gradient(circle at 85% 20%, rgba(244, 114, 182, 0.25), transparent 38%),
                linear-gradient(145deg, #090b1a 0%, #17112f 48%, #090b1a 100%);
        }

        .top-card, .collection-card {
            background: rgba(17, 24, 39, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.13);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(18px);
        }

        .upload-chip {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.35);
        }

        .machine-shell {
            border-color: rgba(244, 114, 182, 0.92);
            background: linear-gradient(160deg, #d9fbff 0%, #dce9ff 46%, #f5dcff 100%);
            box-shadow:
                0 0 0 2px rgba(255, 255, 255, 0.32),
                0 24px 70px rgba(139, 92, 246, 0.34),
                0 0 35px rgba(34, 211, 238, 0.24);
        }

        .machine-top {
            background: linear-gradient(90deg, #7c3aed, #ec4899 52%, #06b6d4);
            box-shadow: 0 8px 26px rgba(124, 58, 237, 0.38);
        }

        .control-deck {
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 52%, #0891b2 100%);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 24px 60px rgba(8, 8, 25, 0.55);
        }

        .preset-strip {
            scrollbar-width: thin;
            scrollbar-color: rgba(244, 114, 182, 0.7) transparent;
        }

        .preset-button {
            flex: 0 0 auto;
            width: 42px;
            height: 42px;
            overflow: hidden;
            border-radius: 9999px;
            border: 2px solid rgba(255, 255, 255, 0.55);
            background: rgba(255, 255, 255, 0.12);
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .preset-button:hover, .preset-button:focus-visible {
            transform: translateY(-2px) scale(1.05);
            border-color: #f9a8d4;
            outline: none;
        }

        .preset-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .glass-glare {
            background: linear-gradient(105deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0.3) 45%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        #prong-left, #prong-right { transition: transform 0.3s ease; }
        .claw-open #prong-left { transform: rotate(35deg); }
        .claw-open #prong-right { transform: rotate(-35deg); }
        .claw-closed #prong-left { transform: rotate(5deg); }
        .claw-closed #prong-right { transform: rotate(-5deg); }

        .prize-item {
            position: absolute;
            transform: translate(-50%, -50%);
            user-select: none;
            -webkit-user-drag: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden;
            background: radial-gradient(circle at 28% 22%, rgba(255,255,255,0.95), rgba(216,235,255,0.32) 45%, rgba(139,92,246,0.46) 100%);
            box-shadow: inset -12px -14px 25px rgba(67,56,202,0.2), 0 9px 18px rgba(30,27,75,0.34);
            border: 2px solid rgba(255,255,255,0.65);
        }
        
        .prize-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.08);
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25));
        }

        .arcade-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 0 #b91c1c; }
        .arcade-btn { box-shadow: 0 6px 0 0 #9f1239, 0 10px 24px rgba(136,19,55,0.4); transition: all 0.1s; }
        .arcade-btn-blue:active { transform: translateY(4px); box-shadow: 0 0px 0 0 #1d4ed8; }
        .arcade-btn-blue { box-shadow: 0 6px 0 0 #4338ca, 0 10px 24px rgba(67,56,202,0.4); transition: all 0.1s; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ec4899;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-start px-2 py-3 font-sans text-white">

    <div class="top-card w-full max-w-[320px] mb-2 flex justify-between items-center p-3 rounded-2xl">
        <h1 class="text-lg font-bold text-pink-400">✨ 醋坛子娃娃机</h1>
        <label class="upload-chip cursor-pointer hover:brightness-110 text-white px-3 py-2 rounded-xl text-xs font-bold transition relative">
            ➕ 上傳並去背
            <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
        </label>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex flex-col items-center justify-center text-white">
        <div class="loader mb-4"></div>
        <p class="font-bold text-lg">AI 正在為圖片去背...</p>
        <p class="text-sm text-gray-300 mt-2">首次執行會下載 AI 模型，請稍候幾秒鐘</p>
    </div>

    <div class="machine-shell relative w-full max-w-[320px] aspect-[4/5] rounded-t-[2rem] border-[6px] overflow-hidden flex flex-col">
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHBhdGggZD0iTTAgMGgyMHYyMEgwem0xMCAxMGgxMHYxMEgxMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4yKSIvPjwvc3ZnPg==')] opacity-50"></div>
        <div class="machine-top absolute top-0 w-full h-10 z-20 flex justify-center items-center">
            <div class="flex space-x-4">
                <div class="w-3 h-3 bg-yellow-300 rounded-full animate-pulse"></div>
                <div class="w-3 h-3 bg-yellow-300 rounded-full animate-pulse delay-75"></div>
                <div class="w-3 h-3 bg-yellow-300 rounded-full animate-pulse delay-150"></div>
            </div>
        </div>

        <div id="game-area" class="relative flex-1 w-full h-full">
            <div class="absolute bottom-0 left-0 w-[25%] h-[20%] bg-gray-800 border-r-4 border-t-4 border-gray-600 rounded-tr-xl flex items-center justify-center z-10">
                <div class="w-3/4 h-3/4 bg-black rounded-lg shadow-inner"></div>
            </div>
            
            <div id="prizes-container" class="absolute inset-0 z-10"></div>

            <div id="claw-assembly" class="absolute top-0 z-30" style="left: 60%; transform: translateX(-50%);">
                <div id="rope" class="w-1.5 bg-gray-400 mx-auto border-l border-gray-300" style="height: 50px;"></div>
                <div id="claw-head" class="relative claw-open w-16 h-12 flex flex-col items-center -mt-1">
                    <div class="w-8 h-5 bg-yellow-400 rounded-t-lg border-2 border-yellow-600 z-10"></div>
                    <div class="absolute top-4 left-1 w-2 h-10 bg-gray-400 origin-top border border-gray-500 rounded-full" id="prong-left"></div>
                    <div class="absolute top-4 right-1 w-2 h-10 bg-gray-400 origin-top border border-gray-500 rounded-full" id="prong-right"></div>
                </div>
            </div>
        </div>

        <div class="glass-glare absolute inset-0 z-40 rounded-t-2xl"></div>
    </div>

    <div class="control-deck w-full max-w-[320px] p-3 rounded-b-[2rem] border-x-[6px] border-b-[6px] flex justify-between items-center z-50">
        <div class="flex space-x-2">
            <button id="btn-left" aria-label="向左移動" class="arcade-btn-blue w-14 h-14 bg-blue-500 hover:bg-blue-400 rounded-full text-2xl flex justify-center items-center select-none active:bg-blue-600 text-white font-black">◀</button>
            <button id="btn-right" aria-label="向右移動" class="arcade-btn-blue w-14 h-14 bg-blue-500 hover:bg-blue-400 rounded-full text-2xl flex justify-center items-center select-none active:bg-blue-600 text-white font-black">▶</button>
        </div>
        <button id="btn-drop" class="arcade-btn w-16 h-16 bg-red-500 hover:bg-red-400 rounded-full text-xl font-bold flex justify-center items-center select-none active:bg-red-600 text-white uppercase tracking-wider">GO!</button>
    </div>

    <div class="collection-card w-full max-w-[320px] mt-2 p-3 rounded-2xl">
        <h2 class="text-xs text-gray-400 font-bold mb-1">戰利品（My Collection）</h2>
        <div id="collection-bin" class="flex flex-wrap gap-2 min-h-[44px]"></div>
    </div>

    <div class="collection-card w-full max-w-[320px] mt-2 p-3 rounded-2xl">
        <h2 class="text-xs text-gray-400 font-bold mb-2">預設圖案（點擊加入）</h2>
        <div id="preset-bin" class="preset-strip flex gap-2 overflow-x-auto pb-1"></div>
    </div>

    <script>
        const GAME_W = 1000;
        const GAME_H = 1000;
        const CHUTE_W = 250; 
        const CHUTE_X = 125; 
        const PRESET_IMAGES = [
            'assets/presets/preset-01.png',
            ...Array.from({ length: 19 }, (_, index) =>
                `assets/presets/preset-${String(index + 2).padStart(2, '0')}.jpeg`
            )
        ];
        
        let claw = {
            x: 600, y: 100, 
            state: 'IDLE', 
            speedX: 8, speedY: 12
        };

        let prizes = [];
        let grabbedPrize = null;
        let isMovingLeft = false;
        let isMovingRight = false;
        const objectUrls = new Set();
        
        const clawAssembly = document.getElementById('claw-assembly');
        const rope = document.getElementById('rope');
        const clawHead = document.getElementById('claw-head');
        const prizesContainer = document.getElementById('prizes-container');
        const collectionBin = document.getElementById('collection-bin');
        const presetBin = document.getElementById('preset-bin');
        const gameArea = document.getElementById('game-area');
        const loadingOverlay = document.getElementById('loading-overlay');

        function addPrize(imgSrc) {
            const id = 'prize_' + Math.random().toString(36).substring(2, 9);
            const size = 100;
            
            const minX = CHUTE_W + size;
            const maxX = GAME_W - size;
            const x = minX + Math.random() * (maxX - minX);
            const y = -size;
            
            const el = document.createElement('div');
            el.className = 'prize-item'; 
            el.style.width = '10%';
            el.style.aspectRatio = '1 / 1';
            el.id = id;
            el.innerHTML = `<img src="${imgSrc}" alt="prize">`;
            
            prizesContainer.appendChild(el);
            
            prizes.push({
                id, el, x, y, size,
                content: imgSrc,
                isGrabbed: false,
                isCollected: false,
                rotation: Math.random() * 360,
                vx: (Math.random() - 0.5) * 5, 
                vy: 0,
                mass: 1
            });
            
            updatePrizeDOM();
        }

        function initializePresets() {
            PRESET_IMAGES.forEach((src, index) => {
                const button = document.createElement('button');
                const image = document.createElement('img');
                button.type = 'button';
                button.className = 'preset-button';
                button.setAttribute('aria-label', `加入預設圖案 ${index + 1}`);
                image.src = src;
                image.alt = `預設圖案 ${index + 1}`;
                button.appendChild(image);
                button.addEventListener('click', () => addPrize(src));
                presetBin.appendChild(button);

                setTimeout(() => addPrize(src), index * 120);
            });
        }

        document.getElementById('image-upload').addEventListener('change', async function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            loadingOverlay.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    if (typeof window.imglyRemoveBackground !== 'function') {
                        throw new Error('去背元件載入失敗');
                    }
                    const blob = await window.imglyRemoveBackground(file);
                    const url = URL.createObjectURL(blob);
                    objectUrls.add(url);
                    addPrize(url);
                } catch (error) {
                    console.error('去背失敗，改用原圖：', error);
                    const reader = new FileReader();
                    reader.onload = (event) => addPrize(event.target.result);
                    reader.readAsDataURL(file);
                }
            }
            
            loadingOverlay.classList.add('hidden');
            this.value = ''; 
        });

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnDrop = document.getElementById('btn-drop');

        window.addEventListener('beforeunload', () => {
            objectUrls.forEach(url => URL.revokeObjectURL(url));
        });

        // 長按按鈕，統一使用 Pointer Events 支援滑鼠與觸控
        const bindHoldEvent = (btn, dir) => {
            const start = (e) => { e.preventDefault(); if(claw.state === 'IDLE') dir === 'left' ? isMovingLeft = true : isMovingRight = true; };
            const stop = (e) => { e.preventDefault(); isMovingLeft = false; isMovingRight = false; };
            btn.addEventListener('pointerdown', start);
            btn.addEventListener('pointerup', stop);
            btn.addEventListener('pointercancel', stop);
            btn.addEventListener('pointerleave', stop);
        };

        bindHoldEvent(btnLeft, 'left');
        bindHoldEvent(btnRight, 'right');

        btnDrop.addEventListener('click', () => {
            if (claw.state === 'IDLE') {
                claw.state = 'DROPPING';
                isMovingLeft = false;
                isMovingRight = false;
            }
        });

        function updateDOM() {
            clawAssembly.style.left = `${(claw.x / GAME_W) * 100}%`;
            rope.style.height = `${(claw.y / GAME_H) * gameArea.clientHeight}px`;

            if (['IDLE', 'DROPPING', 'RELEASING', 'RETURNING'].includes(claw.state)) {
                clawHead.classList.add('claw-open');
                clawHead.classList.remove('claw-closed');
            } else {
                clawHead.classList.remove('claw-open');
                clawHead.classList.add('claw-closed');
            }
        }

        function updatePrizeDOM() {
            prizes.forEach(p => {
                if (p.isCollected) return; 
                p.el.style.left = `${(p.x / GAME_W) * 100}%`;
                p.el.style.top = `${(p.y / GAME_H) * 100}%`;
                p.el.style.transform = `translate(-50%, -50%) rotate(${p.rotation}deg)`;
            });
        }

        function updatePhysics() {
            const gravity = 0.8;
            const friction = 0.9;
            const restitution = 0.4;

            prizes.forEach((p, pIndex) => {
                if (p.isCollected || p.isGrabbed) return;

                p.vy += gravity;
                p.x += p.vx;
                p.y += p.vy;

                if (p.y > GAME_H - p.size / 2) {
                    p.y = GAME_H - p.size / 2;
                    p.vy *= -restitution;
                    p.vx *= friction;
                }
                
                if (p.x > GAME_W - p.size / 2) {
                    p.x = GAME_W - p.size / 2;
                    p.vx *= -restitution;
                } else if (p.x < CHUTE_W + p.size / 2) {
                    if(p.y > GAME_H * 0.8) {
                        p.x = CHUTE_W + p.size / 2;
                        p.vx *= -restitution;
                    } else if (p.x < p.size/2) {
                         p.x = p.size/2;
                         p.vx *= -restitution;
                    }
                }

                prizes.forEach((other, otherIndex) => {
                    if (otherIndex <= pIndex || other.isCollected || other.isGrabbed) return;

                    const dx = other.x - p.x;
                    const dy = other.y - p.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = (p.size + other.size) / 2;

                    if (distance < minDistance) {
                        const overlap = minDistance - distance;
                        const angle = distance === 0
                            ? Math.random() * Math.PI * 2
                            : Math.atan2(dy, dx);
                        
                        const moveX = Math.cos(angle) * overlap / 2;
                        const moveY = Math.sin(angle) * overlap / 2;
                        
                        p.x -= moveX;
                        p.y -= moveY;
                        other.x += moveX;
                        other.y += moveY;

                        const tempVx = p.vx;
                        const tempVy = p.vy;
                        p.vx = other.vx * restitution;
                        p.vy = other.vy * restitution;
                        other.vx = tempVx * restitution;
                        other.vy = tempVy * restitution;
                    }
                });
            });
        }

        function checkClawCollision() {
            let closest = null;
            let minDist = Infinity;
            
            prizes.forEach(p => {
                if (p.isCollected || p.isGrabbed) return;
                
                const dx = Math.abs(p.x - claw.x);
                const dy = p.y - claw.y; 

                if (dx < p.size * 0.7 && dy > 0 && dy < p.size * 0.8) {
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = p;
                    }
                }
            });
            return closest;
        }

        function gameLoop() {
            updatePhysics();

            if (claw.state === 'IDLE') {
                if (isMovingLeft) claw.x -= claw.speedX;
                if (isMovingRight) claw.x += claw.speedX;
                if (claw.x < CHUTE_W + 50) claw.x = CHUTE_W + 50;
                if (claw.x > GAME_W - 50) claw.x = GAME_W - 50;
            }

            switch (claw.state) {
                case 'DROPPING':
                    claw.y += claw.speedY;
                    const hitPrize = checkClawCollision();
                    if (hitPrize || claw.y >= GAME_H - 100) {
                        claw.state = 'GRABBING';
                        if (hitPrize) {
                            grabbedPrize = hitPrize;
                            grabbedPrize.isGrabbed = true;
                            grabbedPrize.vx = 0;
                            grabbedPrize.vy = 0;
                        }
                        setTimeout(() => {
                            if(claw.state === 'GRABBING') claw.state = 'RISING';
                        }, 400);
                    }
                    break;
                    
                case 'RISING':
                    claw.y -= claw.speedY;
                    if (claw.y <= 100) {
                        claw.y = 100;
                        claw.state = 'MOVING_CHUTE';
                    }
                    break;

                case 'MOVING_CHUTE':
                    claw.x -= claw.speedX;
                    if (claw.x <= CHUTE_X) {
                        claw.x = CHUTE_X;
                        claw.state = 'RELEASING';
                        setTimeout(() => {
                            if(claw.state === 'RELEASING') {
                                if (grabbedPrize) {
                                    grabbedPrize.isGrabbed = false;
                                    grabbedPrize.isCollected = true;
                                    grabbedPrize.el.style.display = 'none'; 
                                    
                                    const colItem = document.createElement('div');
                                    colItem.className = 'w-10 h-10 rounded-full flex items-center justify-center border border-gray-400 relative overflow-hidden';
                                    colItem.style.background = 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(200,230,255,0.8) 50%, rgba(100,180,255,0.9) 100%)';
                                    colItem.innerHTML = `<img src="${grabbedPrize.content}" class="w-4/5 h-4/5 object-contain">`;
                                    collectionBin.appendChild(colItem);
                                    
                                    grabbedPrize = null;
                                }
                                setTimeout(() => { claw.state = 'RETURNING'; }, 500);
                            }
                        }, 400);
                    }
                    break;

                case 'RETURNING':
                    claw.x += claw.speedX;
                    if (claw.x >= 600) { 
                        claw.x = 600;
                        claw.state = 'IDLE';
                    }
                    break;
            }

            if (grabbedPrize && grabbedPrize.isGrabbed) {
                grabbedPrize.x = claw.x;
                grabbedPrize.y = claw.y + 50; 
            }

            updateDOM();
            updatePrizeDOM();
            requestAnimationFrame(gameLoop);
        }

        initializePresets();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
